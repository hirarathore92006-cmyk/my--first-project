<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira's Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #cityInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #cityInput:focus {
            border-color: #667eea;
        }

        #searchBtn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1rem;
        }

        .loading::after {
            content: "";
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .weather-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            color: white;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .country-name {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .weather-icon {
            font-size: 5rem;
            margin: 15px 0;
        }

        .temperature {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .weather-desc {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 10px;
        }

        .date-time {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .detail-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .detail-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .detail-label {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .forecast-section {
            margin-top: 20px;
        }

        .forecast-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .forecast-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .forecast-item {
            min-width: 100px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .forecast-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .forecast-day {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 2rem;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }

        .forecast-temp-range {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 0.85rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        /* Scrollbar styling */
        .forecast-container::-webkit-scrollbar {
            height: 6px;
        }

        .forecast-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .forecast-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .temperature {
                font-size: 2.8rem;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather App</h1>
            <p>Get real-time weather for any city</p>
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g. Lahore, London)...">
            <button id="searchBtn" onclick="searchWeather()">Search</button>
        </div>

        <div id="weatherContent">
            <div class="empty-state">
                <div class="empty-state-icon">🌍</div>
                <p>Enter a city name to get weather information</p>
            </div>
        </div>

        <div class="footer">
            <p>Built with ❤️ by <a href="https://hirarathore92006-cmyk.github.io/my--first-project/">Hira Rathore</a></p>
            <p style="margin-top: 5px; font-size: 0.75rem;">Powered by Open-Meteo API</p>
        </div>
    </div>

    <script>
        // Weather icon mapping
        const weatherIcons = {
            0: "☀️",      // Clear sky
            1: "🌤️",      // Mainly clear
            2: "⛅",      // Partly cloudy
            3: "☁️",      // Overcast
            45: "🌫️",     // Fog
            48: "🌫️",     // Depositing rime fog
            51: "🌧️",     // Light drizzle
            53: "🌧️",     // Moderate drizzle
            55: "🌧️",     // Dense drizzle
            61: "🌧️",     // Slight rain
            63: "🌧️",     // Moderate rain
            65: "🌧️",     // Heavy rain
            71: "🌨️",     // Slight snow
            73: "🌨️",     // Moderate snow
            75: "🌨️",     // Heavy snow
            77: "🌨️",     // Snow grains
            80: "🌧️",     // Slight rain showers
            81: "🌧️",     // Moderate rain showers
            82: "🌧️",     // Violent rain showers
            85: "🌨️",     // Slight snow showers
            86: "🌨️",     // Heavy snow showers
            95: "⛈️",     // Thunderstorm
            96: "⛈️",     // Thunderstorm with hail
            99: "⛈️",     // Thunderstorm with heavy hail
        };

        const weatherDescriptions = {
            0: "Clear Sky",
            1: "Mainly Clear",
            2: "Partly Cloudy",
            3: "Overcast",
            45: "Foggy",
            48: "Rime Fog",
            51: "Light Drizzle",
            53: "Moderate Drizzle",
            55: "Dense Drizzle",
            61: "Light Rain",
            63: "Moderate Rain",
            65: "Heavy Rain",
            71: "Light Snow",
            73: "Moderate Snow",
            75: "Heavy Snow",
            77: "Snow Grains",
            80: "Light Showers",
            81: "Moderate Showers",
            82: "Heavy Showers",
            85: "Light Snow Showers",
            86: "Heavy Snow Showers",
            95: "Thunderstorm",
            96: "Thunderstorm with Hail",
            99: "Heavy Thunderstorm",
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('cityInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchWeather();
                }
            });

            // Load last searched city
            const lastCity = localStorage.getItem('lastCity');
            if (lastCity) {
                document.getElementById('cityInput').value = lastCity;
                searchWeather();
            }
        });

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            const btn = document.getElementById('searchBtn');
            const content = document.getElementById('weatherContent');

            if (!city) {
                content.innerHTML = '<div class="error">Please enter a city name!</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Loading...';
            content.innerHTML = '<div class="loading">Fetching weather data</div>';

            try {
                // Step 1: Get coordinates from city name using Geocoding API
                const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error('City not found. Please try another city name.');
                }

                const location = geoData.results[0];
                const lat = location.latitude;
                const lon = location.longitude;
                const cityName = location.name;
                const country = location.country;

                // Save to localStorage
                localStorage.setItem('lastCity', city);

                // Step 2: Get weather data
                const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
                const weatherData = await weatherResponse.json();

                displayWeather(cityName, country, weatherData);

            } catch (error) {
                content.innerHTML = `<div class="error">${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Search';
            }
        }

        function displayWeather(cityName, country, data) {
            const current = data.current;
            const daily = data.daily;
            const weatherCode = current.weather_code;
            const icon = weatherIcons[weatherCode] || "🌡️";
            const description = weatherDescriptions[weatherCode] || "Unknown";

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            // Generate forecast HTML
            let forecastHTML = '';
            for (let i = 1; i < 5; i++) {
                const dayCode = daily.weather_code[i];
                const dayIcon = weatherIcons[dayCode] || "🌡️";
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);

                forecastHTML += `
                    <div class="forecast-item">
                        <div class="forecast-day">${dayName}</div>
                        <div class="forecast-icon">${dayIcon}</div>
                        <div class="forecast-temp">${maxTemp}°C</div>
                        <div class="forecast-temp-range">${minTemp}°C - ${maxTemp}°C</div>
                    </div>
                `;
            }

            const content = document.getElementById('weatherContent');
            content.innerHTML = `
                <div class="weather-card">
                    <div class="city-name">${cityName}</div>
                    <div class="country-name">${country}</div>
                    <div class="weather-icon">${icon}</div>
                    <div class="temperature">${Math.round(current.temperature_2m)}°C</div>
                    <div class="weather-desc">${description}</div>
                    <div class="date-time">${dateStr}</div>
                </div>

                <div class="details-grid">
                    <div class="detail-card">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">${current.relative_humidity_2m}%</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value">${Math.round(current.apparent_temperature)}°C</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value">${current.wind_speed_10m} km/h</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">📊</div>
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">${current.pressure_msl} hPa</div>
                    </div>
                </div>

                <div class="forecast-section">
                    <div class="forecast-title">📅 4-Day Forecast</div>
                    <div class="forecast-container">
                        ${forecastHTML}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
